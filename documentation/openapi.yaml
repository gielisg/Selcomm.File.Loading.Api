openapi: 3.0.3
info:
  title: FileLoading API
  description: >-
    File Loading API - loads and processes network files (converted from ntfileload.4gl).
    Supports multiple file classes: CDR, CHG, EBL, SVC, and more.
    Includes file management, transfer operations, parser configuration, and workflow tracking.
  version: "4.0.0"
  contact:
    name: Select Software

servers:
  - url: http://localhost:5140
    description: Local development
  - url: https://api.example.com
    description: Production

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Health
    description: Health check endpoints
  - name: File Loading
    description: Load and process network files
  - name: File Management
    description: Manage files in the transfer workflow
  - name: Transfer Operations
    description: Fetch files from remote transfer sources
  - name: Activity Log
    description: File activity audit trail
  - name: Validation
    description: File validation summaries
  - name: Exceptions
    description: Files with errors or skipped status
  - name: Transfer Sources
    description: CRUD operations for transfer source configurations
  - name: Parser Configuration
    description: CRUD operations for generic parser configurations
  - name: Folder Configuration
    description: Folder workflow configuration per file-type
  - name: Vendors
    description: CRUD operations for vendors (networks table)
  - name: File Classes
    description: CRUD operations for file classes
  - name: File Types
    description: CRUD operations for file types
  - name: File Types NT
    description: CRUD operations for file type NT records

paths:
  # ==================================================
  # Health Check
  # ==================================================
  /api/v4/file-loading/health-check:
    get:
      operationId: get_api_v4_file_loading_health_check
      tags:
        - Health
      summary: Health check
      description: >-
        Returns API health status and database connectivity.
        Uses the shared HealthCheck connection string from appsettings.shared.json.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
              example:
                Status: Healthy
                Timestamp: "2026-03-20T10:30:00Z"
                Service: File Loading API
                Version: "4.0.0"
                Database:
                  Status: Connected
                  ResponseTimeMs: 12
        "503":
          description: Service is unhealthy (database unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
              example:
                Status: Unhealthy
                Timestamp: "2026-03-20T10:30:00Z"
                Service: File Loading API
                Version: "4.0.0"
                Database:
                  Status: Unreachable
                  Message: "Connection refused"

  # ==================================================
  # File Loading
  # ==================================================
  /api/v4/file-loading/load:
    post:
      operationId: post_api_v4_file_loading_load
      tags:
        - File Loading
      summary: Load a network file for processing
      description: Load a network file for processing by specifying a file path and type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoadFileRequest"
      responses:
        "202":
          description: File load accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileLoadResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Invalid file type code"
                ErrorCode: "INVALID_FILE_TYPE"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/upload:
    post:
      operationId: post_api_v4_file_loading_upload
      tags:
        - File Loading
      summary: Upload and load a file
      description: Upload a file via multipart form data and load it for processing.
      parameters:
        - name: fileType
          in: query
          required: true
          description: File type code
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload
              required:
                - file
      responses:
        "202":
          description: File upload accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileLoadResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "File is empty"
                ErrorCode: "EMPTY_FILE"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/files/{nt-file-num}:
    get:
      operationId: get_api_v4_file_loading_files_nt_file_num
      tags:
        - File Loading
      summary: Get file load status
      description: Get file load status by nt-file-num (the database record key assigned at load time).
      parameters:
        - $ref: "#/components/parameters/NtFileNum"
      responses:
        "200":
          description: File status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "File not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/files:
    get:
      operationId: get_api_v4_file_loading_files
      tags:
        - File Loading
      summary: List loaded files with filtering
      description: List loaded files with optional filtering by file type code, customer number, and max records.
      parameters:
        - name: fileTypeCode
          in: query
          required: false
          description: Filter by file type code (e.g. CDR, CHG, SSSWHLSCDR)
          schema:
            type: string
        - name: ntCustNum
          in: query
          required: false
          description: Filter by customer number
          schema:
            type: string
        - name: maxRecords
          in: query
          required: false
          description: Maximum records to return (default 100)
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: File list retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
        "204":
          description: No files found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/file-types:
    get:
      operationId: get_api_v4_file_loading_file_types
      tags:
        - File Loading
      summary: Get supported file types for loading
      description: Returns the list of supported file types for loading operations.
      responses:
        "200":
          description: File type list retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTypeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/files/{nt-file-num}/reprocess:
    post:
      operationId: post_api_v4_file_loading_files_nt_file_num_reprocess
      tags:
        - File Loading
      summary: Reprocess a previously loaded file
      description: Reprocess a previously loaded file by its nt-file-num.
      parameters:
        - $ref: "#/components/parameters/NtFileNum"
      responses:
        "202":
          description: Reprocess accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileLoadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "File not found"
                ErrorCode: "NOT_FOUND"

  # ==================================================
  # File Management - Dashboard
  # ==================================================
  /api/v4/file-loading/dashboard:
    get:
      operationId: get_api_v4_file_loading_dashboard
      tags:
        - File Management
      summary: Get dashboard summary data
      description: Get dashboard summary data including file counts by folder and transfer source statuses.
      parameters:
        - name: fileType
          in: query
          required: false
          description: Filter by file type code
          schema:
            type: string
      responses:
        "200":
          description: Dashboard data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileManagementDashboard"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ==================================================
  # File Management - Files (workflow)
  # ==================================================
  /api/v4/file-loading/manager/files:
    get:
      operationId: get_api_v4_file_loading_manager_files
      tags:
        - File Management
      summary: List files in the transfer workflow
      description: >-
        List files in the transfer workflow with filtering.
        Supports file-type, folder, status, date range, and filename search filters.
      parameters:
        - name: fileType
          in: query
          required: false
          description: Filter by file type code (e.g. CDR, CHG, SSSWHLSCDR)
          schema:
            type: string
        - name: folder
          in: query
          required: false
          description: Filter by current folder (Transfer, Processing, Processed, Errors, Skipped)
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: "Filter by transfer status (0=Pending, 1=Downloading, 2=Downloaded, 3=Processing, 4=Processed, 5=Error, 6=Skipped)"
          schema:
            $ref: "#/components/schemas/TransferStatus"
        - name: fromDate
          in: query
          required: false
          description: Filter by date range start (inclusive)
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          required: false
          description: Filter by date range end (inclusive)
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          required: false
          description: Search by file name (partial match)
          schema:
            type: string
        - name: maxRecords
          in: query
          required: false
          description: Maximum records to return (default 100)
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: File list retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListWithStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/manager/files/{transfer-id}:
    get:
      operationId: get_api_v4_file_loading_manager_files_transfer_id
      tags:
        - File Management
      summary: Get file details by transfer-id
      description: Get file details by transfer-id (the workflow tracking key).
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: File details retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileWithStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer record not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/manager/files/{transfer-id}/process:
    post:
      operationId: post_api_v4_file_loading_manager_files_transfer_id_process
      tags:
        - File Management
      summary: Process a file from the transfer workflow
      description: Process a file from the transfer workflow by its transfer-id.
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: File processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileLoadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Transfer record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer record not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/manager/files/{transfer-id}/retry:
    post:
      operationId: post_api_v4_file_loading_manager_files_transfer_id_retry
      tags:
        - File Management
      summary: Retry processing a failed file
      description: Retry processing a file that previously failed.
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: Retry started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileLoadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Transfer record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer record not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/manager/files/{transfer-id}/move:
    post:
      operationId: post_api_v4_file_loading_manager_files_transfer_id_move
      tags:
        - File Management
      summary: Move a file to a specific workflow folder
      description: Move a file to a specific workflow folder (Transfer, Processing, Processed, Errors, Skipped).
      parameters:
        - $ref: "#/components/parameters/TransferId"
        - name: folder
          in: query
          required: true
          description: Target folder name (Transfer, Processing, Processed, Errors, Skipped)
          schema:
            type: string
        - name: reason
          in: query
          required: false
          description: Optional reason for the move
          schema:
            type: string
      responses:
        "200":
          description: File moved successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Transfer record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer record not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/manager/files/{nt-file-num}/unload:
    post:
      operationId: post_api_v4_file_loading_manager_files_nt_file_num_unload
      tags:
        - File Management
      summary: Unload a loaded file
      description: >-
        Unload a loaded file (reverse the load operation).
        Uses nt-file-num because it operates on the database record created at load time.
      parameters:
        - $ref: "#/components/parameters/NtFileNum"
      responses:
        "200":
          description: File unloaded successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "File not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/manager/files/{nt-file-num}/skip-sequence:
    post:
      operationId: post_api_v4_file_loading_manager_files_nt_file_num_skip_sequence
      tags:
        - File Management
      summary: Force skip a sequence number
      description: >-
        Force skip a sequence number.
        Uses nt-file-num because it operates on the database record created at load time.
      parameters:
        - $ref: "#/components/parameters/NtFileNum"
        - name: skipTo
          in: query
          required: true
          description: Sequence number to skip to
          schema:
            type: integer
        - name: reason
          in: query
          required: false
          description: Optional reason for skipping
          schema:
            type: string
      responses:
        "200":
          description: Sequence skipped successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "File not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/manager/files/{transfer-id}/download:
    get:
      operationId: get_api_v4_file_loading_manager_files_transfer_id_download
      tags:
        - File Management
      summary: Download a file to browser
      description: Download a file from the workflow to the user's browser.
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "File not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/manager/files/{transfer-id}:
    delete:
      operationId: delete_api_v4_file_loading_manager_files_transfer_id
      tags:
        - File Management
      summary: Delete a file from the workflow
      description: Delete a file from the transfer workflow.
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: File deleted successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer record not found"
                ErrorCode: "NOT_FOUND"

  # ==================================================
  # Activity Log
  # ==================================================
  /api/v4/file-loading/activity:
    get:
      operationId: get_api_v4_file_loading_activity
      tags:
        - Activity Log
      summary: Get activity log entries
      description: Get activity log entries. Filter by nt-file-num, transfer-id, or both.
      parameters:
        - name: ntFileNum
          in: query
          required: false
          description: Filter by file number
          schema:
            type: integer
        - name: transferId
          in: query
          required: false
          description: Filter by transfer record ID
          schema:
            type: integer
        - name: maxRecords
          in: query
          required: false
          description: Maximum records to return (default 100)
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Activity log entries retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileActivityLog"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ==================================================
  # Validation
  # ==================================================
  /api/v4/file-loading/files/{nt-file-num}/validation-summary:
    get:
      operationId: get_api_v4_file_loading_files_nt_file_num_validation_summary
      tags:
        - Validation
      summary: Get AI-friendly validation summary
      description: Get AI-friendly validation summary for a loaded file.
      parameters:
        - $ref: "#/components/parameters/NtFileNum"
      responses:
        "200":
          description: Validation summary retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationSummaryForAI"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "File not found"
                ErrorCode: "NOT_FOUND"

  # ==================================================
  # Exceptions
  # ==================================================
  /api/v4/file-loading/exceptions/errors:
    get:
      operationId: get_api_v4_file_loading_exceptions_errors
      tags:
        - Exceptions
      summary: Get files with processing errors
      description: Get files with processing errors with optional filtering.
      parameters:
        - name: fileType
          in: query
          required: false
          description: Filter by file type code
          schema:
            type: string
        - name: maxRecords
          in: query
          required: false
          description: Maximum records to return (default 100)
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Error files retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileWithStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/exceptions/skipped:
    get:
      operationId: get_api_v4_file_loading_exceptions_skipped
      tags:
        - Exceptions
      summary: Get skipped files
      description: Get files that were skipped during processing.
      parameters:
        - name: fileType
          in: query
          required: false
          description: Filter by file type code
          schema:
            type: string
        - name: maxRecords
          in: query
          required: false
          description: Maximum records to return (default 100)
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Skipped files retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileWithStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ==================================================
  # Transfer Operations
  # ==================================================
  /api/v4/file-loading/transfers/{source-id}/fetch:
    post:
      operationId: post_api_v4_file_loading_transfers_source_id_fetch
      tags:
        - Transfer Operations
      summary: Fetch files from a transfer source
      description: Fetch files from a transfer source (SFTP/FTP/FileSystem).
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Fetch completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferFetchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer source not found"
                ErrorCode: "NOT_FOUND"

  # ==================================================
  # Transfer Sources (CRUD)
  # ==================================================
  /api/v4/file-loading/sources:
    get:
      operationId: get_api_v4_file_loading_sources
      tags:
        - Transfer Sources
      summary: List all transfer source configurations
      description: List all transfer source configurations.
      responses:
        "200":
          description: Transfer sources retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransferSourceConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/sources/{source-id}:
    get:
      operationId: get_api_v4_file_loading_sources_source_id
      tags:
        - Transfer Sources
      summary: Get a specific transfer source configuration
      description: Get a specific transfer source configuration by source-id.
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Transfer source retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSourceConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer source not found"
                ErrorCode: "NOT_FOUND"

    put:
      operationId: put_api_v4_file_loading_sources_source_id
      tags:
        - Transfer Sources
      summary: Create or update a transfer source
      description: Create or update a transfer source. Use source-id=0 to create (ID is auto-generated).
      parameters:
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferSourceRequest"
      responses:
        "200":
          description: Transfer source saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSourceConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      operationId: delete_api_v4_file_loading_sources_source_id
      tags:
        - Transfer Sources
      summary: Delete a transfer source configuration
      description: Delete a transfer source configuration by source-id.
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Transfer source deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Transfer source not found"
                ErrorCode: "NOT_FOUND"

  /api/v4/file-loading/sources/{source-id}/test:
    post:
      operationId: post_api_v4_file_loading_sources_source_id_test
      tags:
        - Transfer Sources
      summary: Test connection to a saved transfer source
      description: Test connection to a saved transfer source by source-id.
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Connection successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"
              example:
                Success: true
                Message: "Connection successful"
        "400":
          description: Connection test failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                Error: "Connection test failed"
                ErrorCode: "CONNECTION_FAILED"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v4/file-loading/sources/test:
    post:
      operationId: post_api_v4_file_loading_sources_test
      tags:
        - Transfer Sources
      summary: Test connection with provided configuration
